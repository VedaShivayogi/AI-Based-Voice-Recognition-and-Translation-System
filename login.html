<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | Voice Translator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .app-logo i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-logo h1 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .app-logo p {
            color: #666;
            font-size: 14px;
        }

        .login-form h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 2px solid #e1e5ee;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background-color: white;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 40px;
            color: #999;
            font-size: 18px;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        .error-message i {
            font-size: 18px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .demo-credentials {
            margin-top: 25px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 12px;
            font-size: 13px;
            color: #666;
            border: 1px dashed #667eea;
        }

        .demo-credentials h4 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .demo-credentials p {
            margin-bottom: 5px;
        }

        .demo-credentials code {
            background: #eef2ff;
            padding: 3px 8px;
            border-radius: 5px;
            color: #667eea;
            font-weight: 600;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #888;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 25px;
            }

            .app-logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="app-logo">
                <i class="fas fa-language"></i>
                <h1>Voice Translator Pro</h1>
                <p>Speech to Text • Translation • Text to Speech</p>
            </div>

            <div class="login-form">
                <h2>Welcome Back</h2>

                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ messages[0] }}
                </div>
                {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="input-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label for="password"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn-login">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>

                <div class="demo-credentials">
                    <h4><i class="fas fa-info-circle"></i> Demo Credentials</h4>
                    <p>Email: <code>ved@gmail.com</code></p>
                    <p>Password: <code>0807</code></p>
                </div>

                <div class="footer-text">
                    <p><i class="far fa-copyright"></i> 2026 VSR Voice Translator Pro. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
